<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="author" content="Harry"/>
  <meta name="description" content="Contact Lassi &amp; Latte Lounge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link type="image/png" sizes="16x16" rel="icon" href="icons8-coffee-16.png">
  <title>Contact Us - Lassi &amp; Latte Lounge</title>
</head>

<body>
  <header>
    <h1>Contact Us</h1>
  
    <nav>
      <ul>
        <li>
          <a href="index.html">Home</a>
        </li>
        <li>
          <a href="index.html#about">About LLL</a>
        </li>
        <li>
          <a href="index.html#menu">Our Menu</a>
        </li>
        <li>
          <a href="hours.html">Store Hours</a>
        </li>
      </ul>
    </nav>
  
    <figure style=text-align:center;>
      <img 
        src="contactusimage.png" 
        alt="Lassi and coffee" 
        title= "Lassi &amp; Latte Lounge"
        width="400">
      <figcaption>We love refreshing drinks ☕🥤</figcaption>
    </figure>
  </header>

  <hr>
  
  <main>
  
    <section>
      <h2>Send Us A Message</h2>
    
      <form action="https://httpbin.org/get" method="get">
        <fieldset>
          <legend>Contact Form</legend>
    
          <p>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
          </p>
    
          <p>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
          </p>
    
          <p>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5"></textarea>
          </p>
    
        </fieldset>
    
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </form>
    </section>
    
    <section>
      <h2>Our Location</h2>
    
      <address>
        101 Punjabi Street<br>
        Coffee City, CC 12345<br><br>
        Phone: <a href="tel:+91123456789">+91123456789</a>
      </address>
    </section>
    
    <p>
      <a href="#">Back To Top</a>
    </p>
  
  </main>
  
  <hr>

  <footer>
    <p>Copyright &copy; Lassi &amp; Latte Lounge</p>
  </footer>

</body>
</html>
